<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diet — Save backup</title>
  <script>
    (function () {
      try {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) {
              r.unregister();
            });
          });
        }
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              caches.delete(k);
            });
          });
        }
        localStorage.removeItem("dietAppBuild");
      } catch (e) {}
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f2f2f7;
      color: #1c1c1e;
    }
    main {
      max-width: 420px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }
    p {
      line-height: 1.45;
      color: rgba(60, 60, 67, 0.75);
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      background: #007aff;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
    }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff;
      font-size: 15px;
    }
    a {
      color: #007aff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Save your backup</h1>
    <p>
      Use this page if the Diet app is frozen. It reads data saved on this phone only —
      nothing is sent to a server.
    </p>
    <p id="status" class="status">Checking this device…</p>
    <button type="button" id="downloadBtn" hidden>Download backup</button>
    <p style="margin-top: 24px">
      After saving, you can open the
      <a href="./index.html?v=69">main app</a>.
    </p>
  </main>
  <script>
    (function () {
      var KEYS = ["dietTracker_v4", "dietTracker_v3", "dietTracker_v2", "dietTracker_v1"];
      var status = document.getElementById("status");
      var btn = document.getElementById("downloadBtn");
      var raw = null;
      var storageKey = null;

      for (var i = 0; i < KEYS.length; i += 1) {
        var hit = localStorage.getItem(KEYS[i]);
        if (hit) {
          raw = hit;
          storageKey = KEYS[i];
          break;
        }
      }

      if (!raw) {
        status.textContent = "No Diet data found on this install. Open the same link you used when you added the app to your Home Screen.";
        return;
      }

      var state;
      try {
        state = JSON.parse(raw);
      } catch (e) {
        status.textContent = "Data is here but could not be read. Try the main app or contact support with a screenshot.";
        return;
      }

      var meals = Array.isArray(state.mealLogs) ? state.mealLogs.length : 0;
      var weights = Array.isArray(state.weightEntries) ? state.weightEntries.length : 0;
      status.textContent =
        "Found your data (" + meals + " meal logs, " + weights + " weight entries). Tap below to save a .json file.";

      btn.hidden = false;
      btn.addEventListener("click", function () {
        var payload = {
          app: "diet-tracker",
          backupVersion: 1,
          storageKey: storageKey,
          exportedAt: new Date().toISOString(),
          state: state,
        };
        var json = JSON.stringify(payload, null, 2);
        var blob = new Blob([json], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "diet-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        status.textContent = "Backup downloaded. Keep that file somewhere safe (Files app, iCloud, email to yourself).";
      });
    })();
  </script>
</body>
</html>
